<!-- scramjet/popup-launcher.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altior Portal Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        button {
            background: linear-gradient(135deg, #45a29e 0%, #1f2833 100%);
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(69, 162, 158, 0.6);
        }
    </style>
</head>
<body>
    <button id="launchBtn">Open</button>

    <script>
        document.getElementById('launchBtn').addEventListener('click', () => {
            fetch('https://raw.githubusercontent.com/ltorl/altior-portal/refs/heads/main/scramjet/popup-version.html')
                .then(response => response.text())
                .then(html => {
                    const popupWin = window.open("about:blank", "_blank");
                    if (popupWin) {
                        popupWin.document.open();
                        popupWin.document.write(html);
                        popupWin.document.close();
                    } else {
                        alert("Popup blocked! Please allow popups for this site.");
                    }
                })
                .catch(err => {
                    console.error("Failed to load popup interface:", err);
                    alert("Could not load the popup interface. Check console for errors.");
                });
        });
    </script>
</body>
</html>
