<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altior Portal</title>
    <style>
        :root {
            --glow-color: rgba(0, 195, 255, 0.6);
            --accent-color: #45a29e;
            --accent-glow: #66fcf1;
            --bg-dark: #0b0c10;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
        }

        #search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        #search-container.active-mode {
            top: 0;
            transform: translate(-50%, 0);
            padding: 15px 0;
            flex-direction: row;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            gap: 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow-color);
            margin: 0;
            transition: all 0.6s ease;
            cursor: default;
        }

        #search-container.active-mode .title {
            font-size: 1.5rem;
            margin-left: 30px;
            text-shadow: 0 0 10px rgba(69, 162, 158, 0.5);
            color: var(--accent-glow);
        }

        .input-group {
            display: flex;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(0, 195, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.15);
        }

        #search-container.active-mode .input-group {
            width: 50%;
            margin-right: 30px;
            max-width: 800px;
            padding: 4px;
        }

        #url-input { 
            flex-grow: 1; 
            padding: 14px 20px; 
            border: none; 
            background: transparent;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        #url-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        button { 
            padding: 12px 28px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: var(--accent-color); 
            color: #0b0c10; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        button:hover { 
            background: var(--accent-glow);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.5);
            transform: scale(1.02);
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .quick-link {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .quick-link:hover {
            background: var(--accent-color);
            color: #0b0c10;
            transform: translateY(-2px);
            border-color: var(--accent-glow);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="search-container">
        <h1 class="title">proxy</h1>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Search with DuckDuckGo or enter URL..." autocomplete="off" spellcheck="false">
            <button id="go-btn">Go</button>
        </div>
        <div id="error-message" class="error-message"></div>
        <h2>

        <div class="quick-links">

        </div>
        <div class="quick-links">

        </div>
        <div class="quick-links">
            <div class="quick-link" data-url="https://gba.js.org/">GBA Online Games</div>

        <div class="quick-links">

        <div class="quick-links">
            <div class="quick-link" data-url="https://docs.google.com/forms/d/e/1FAIpQLSfuc1-5vRl31wIZtfgLqZccgm6guUXWFEq6WBYexGNYT3quuQ/viewform?usp=header">request game site</div>
        </div>
    </div>

</body>
</html>
