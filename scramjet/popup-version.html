<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altior Portal</title>
    <style>
        :root {
            --glow-color: rgba(0, 195, 255, 0.6);
            --accent-color: #45a29e;
            --accent-glow: #66fcf1;
            --bg-dark: #0b0c10;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
        }

        #search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        #search-container.active-mode {
            top: 0;
            transform: translate(-50%, 0);
            padding: 15px 0;
            flex-direction: row;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            gap: 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow-color);
            margin: 0;
            transition: all 0.6s ease;
            cursor: default;
        }

        #search-container.active-mode .title {
            font-size: 1.5rem;
            margin-left: 30px;
            text-shadow: 0 0 10px rgba(69, 162, 158, 0.5);
            color: var(--accent-glow);
        }

        .input-group {
            display: flex;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(0, 195, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.15);
        }

        #search-container.active-mode .input-group {
            width: 50%;
            margin-right: 30px;
            max-width: 800px;
            padding: 4px;
        }

        #url-input { 
            flex-grow: 1; 
            padding: 14px 20px; 
            border: none; 
            background: transparent;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        #url-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        button { 
            padding: 12px 28px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: var(--accent-color); 
            color: #0b0c10; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        button:hover { 
            background: var(--accent-glow);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.5);
            transform: scale(1.02);
        }

        #content-frame { 
            position: absolute;
            top: 80px; 
            left: 0;
            width: 100%; 
            height: calc(100vh - 80px);
            border: none; 
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease 0.2s;
            z-index: 1;
        }

        #content-frame.visible {
            opacity: 1;
            pointer-events: all;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <h1 class="title">proxy</h1>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Search with DuckDuckGo or enter URL..." autocomplete="off" spellcheck="false">
            <button id="go-btn">Go</button>
        </div>
        <div id="error-message" class="error-message"></div>
    </div>
    
    <iframe id="content-frame"></iframe>

    <script type="importmap">
        {
            "imports": {
                "@mercuryworkshop/bare-mux": "/baremux/index.mjs"
            }
        }
    </script>

    <script type="module">
        import { BareMuxConnection } from '@mercuryworkshop/bare-mux';
        
        import '/scram/scramjet.all.js';

        const input = document.getElementById('url-input');
        const button = document.getElementById('go-btn');
        const container = document.getElementById('search-container');
        const errorDiv = document.getElementById('error-message');
        let currentIframe = document.getElementById('content-frame');

        let scramjet = null;
        let isScramjetReady = false;

        async function initScramjet() {
            try {
                const { ScramjetController } = $scramjetLoadController();
                scramjet = new ScramjetController({
                    files: {
                        wasm: '/scram/scramjet.wasm.wasm',
                        all: '/scram/scramjet.all.js',
                        sync: '/scram/scramjet.sync.js',
                    }
                });
                await scramjet.init();
                isScramjetReady = true;
                console.log('Scramjet initialized');
            } catch (err) {
                console.error('Scramjet init failed:', err);
                errorDiv.textContent = 'Failed to initialize proxy engine.';
                errorDiv.style.display = 'block';
            }
        }

        async function registerSW() {
            if (!('serviceWorker' in navigator)) {
                throw new Error('Service workers not supported');
            }
            const registration = await navigator.serviceWorker.register('/sw.js');
            console.log('Service Worker registered:', registration);
        }

        function normalizeUrl(query) {
            query = query.trim();
            if (!query) return null;
            
            const isUrl = query.includes('.') && !query.includes(' ');
            if (!isUrl) {
                return `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
            }
            if (!query.startsWith('http://') && !query.startsWith('https://')) {
                return 'https://' + query;
            }
            return query;
        }

        async function navigate(query) {
            const url = normalizeUrl(query);
            if (!url) return;

            errorDiv.style.display = 'none';

            if (!isScramjetReady) {
                errorDiv.textContent = 'Proxy engine is still loading, please wait.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                await registerSW();
            } catch (err) {
                errorDiv.textContent = 'Service Worker registration failed: ' + err.message;
                errorDiv.style.display = 'block';
                return;
            }

            const connection = new BareMuxConnection('/baremux/worker.js');
            const wispUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/wisp/`;
            
            const currentTransport = await connection.getTransport();
            if (currentTransport !== '/libcurl/index.mjs') {
                await connection.setTransport('/libcurl/index.mjs', [{ websocket: wispUrl }]);
                console.log('Transport set to libcurl with wisp:', wispUrl);
            }

            const frameObj = scramjet.createFrame();
            const newIframe = frameObj.frame;
            newIframe.id = 'content-frame';
            newIframe.classList.add('visible');
            
            if (currentIframe && currentIframe.parentNode) {
                currentIframe.parentNode.replaceChild(newIframe, currentIframe);
            } else {
                document.body.appendChild(newIframe);
            }
            currentIframe = newIframe;
            
            frameObj.go(url);
            
            container.classList.add('active-mode');
        }

        button.addEventListener('click', () => navigate(input.value));
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(input.value);
        });

        initScramjet();
    </script>
</body>
</html>
