<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link rel="icon" type="image/png" sizes="48x48"
        href="./GCfavicon.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
    </style>
</head>
<body>

    <button id="open-portal-btn" style='width: 100%; height: 100%'>Open Portal</button>

    <script>
        document.getElementById('open-portal-btn').addEventListener('click', () => {
            const popupWin = window.open('about:blank', '_blank');
            
            if (!popupWin) {
                alert('Popup blocked! Please allow popups for this site.');
                return;
            }

            popupWin.document.body.style.margin = '0';
            popupWin.document.body.style.overflow = 'hidden';

            const iframe = popupWin.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';
            
            iframe.src = window.location.origin + '/'; 
            
            popupWin.document.body.appendChild(iframe);
            
            popupWin.document.title = "New Tab";
            const link = popupWin.document.createElement('link');
            link.rel = 'icon';
            link.href = 'https://cdn.jsdelivr.net/gh/ltorl/altior-portal/scramjet/NewTabIcon.png';
            popupWin.document.head.appendChild(link);
        });
    </script>

</body>
</html>
